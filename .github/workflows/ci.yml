name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.12"]  # exercise the supported floor and a current release
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # NOTE: a full `uv sync` resolves pygenogrove from git, which builds the C++
      # core. Until that build is wired up in CI, run the skeleton tests in an
      # ephemeral env: `--no-project` skips project/pygenogrove resolution and
      # `--with pytest` adds the runner. Expand to `uv sync` once pygenogrove
      # builds here.
      - name: Run skeleton tests
        run: PYTHONPATH=src uv run --no-project --with pytest --python ${{ matrix.python }} pytest -q
